name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
       - name: Release to crates.io and create GitHub release
         uses: release-plz/[email protected]
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

  build-binaries:
    needs: release
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: leanKG
            npm_platform: linux-x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary_name: leanKG
            npm_platform: macos-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary_name: leanKG
            npm_platform: macos-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Create tar.gz
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          tar -czf ../leanKG-${{ matrix.npm_platform }}.tar.gz ${{ matrix.binary_name }}
      - name: Upload asset to release
        uses: softprops/action-gh-release@v1
        with:
          tag: ${{ needs.release.outputs.tag }}
          files: leanKG-${{ matrix.npm_platform }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'
      - run: cd npm && npm ci
      - run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}